<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPortal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1c1c28;
    --border: rgba(255,255,255,.08);
    --border-hover: rgba(167,139,250,.4);
    --accent: #a78bfa;
    --accent-dark: #7c3aed;
    --text: #f0eeff;
    --muted: #6b6b8a;
    --muted2: #9898b8;
    --danger: #f87171;
    --card-radius: 14px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ── glow blob ── */
  body::after {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, rgba(124,58,237,.15) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  header {
    position: sticky; top: 0; z-index: 50;
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(10,10,15,.8);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem; font-weight: 800;
    background: linear-gradient(120deg, #c4b5fd, #818cf8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -.02em;
  }

  .add-btn {
    display: flex; align-items: center; gap: .4rem;
    padding: .55rem 1.1rem;
    background: var(--accent-dark);
    color: #fff; border: none;
    border-radius: 8px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: .875rem; font-weight: 600;
    transition: background .15s, transform .1s;
  }
  .add-btn:hover { background: #6d28d9; }
  .add-btn:active { transform: scale(.97); }

  /* ── search bar ── */
  .search-wrap {
    padding: 1.5rem 2rem .5rem;
    max-width: 1200px; margin: 0 auto;
    position: relative; z-index: 1;
  }
  .search-wrap input {
    width: 100%; max-width: 400px;
    padding: .55rem 1rem .55rem 2.4rem;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: .875rem;
    outline: none; transition: border .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 2.8rem; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: .9rem; pointer-events: none;
  }

  /* ── grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1.25rem;
    padding: 1.5rem 2rem 4rem;
    max-width: 1200px; margin: 0 auto;
    position: relative; z-index: 1;
  }

  /* ── card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    display: flex; flex-direction: column;
    text-decoration: none; color: inherit;
    transition: border-color .2s, transform .2s;
    animation: fadeUp .35s ease both;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-3px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-thumb {
    width: 100%; height: 160px;
    background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; flex-shrink: 0;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-thumb-icon {
    font-size: 2.5rem; opacity: .25;
    background: linear-gradient(135deg, var(--bg3), #1e1e30);
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }

  .card-body { padding: 1rem; flex: 1; }
  .card-title {
    font-weight: 600; font-size: .95rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: .3rem;
  }
  .card-url {
    font-size: .73rem; color: var(--accent);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: .5rem; opacity: .8;
  }
  .card-desc {
    font-size: .8rem; color: var(--muted2); line-height: 1.55;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    padding: .6rem 1rem;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-open { font-size: .72rem; color: var(--muted); }
  .del-btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: .75rem; padding: .2rem .5rem;
    border-radius: 4px; transition: .15s;
    font-family: 'DM Sans', sans-serif;
  }
  .del-btn:hover { color: var(--danger); background: rgba(248,113,113,.1); }

  /* ── empty state ── */
  .empty {
    grid-column: 1 / -1;
    text-align: center; padding: 5rem 2rem;
    color: var(--muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: .3; }
  .empty p { font-size: .9rem; line-height: 1.8; }

  .loading {
    grid-column: 1 / -1;
    text-align: center; padding: 3rem;
    color: var(--muted); font-size: .9rem;
  }
  .spin {
    display: inline-block;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── modal ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; padding: 1rem;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.8rem;
    width: 100%; max-width: 460px;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem; font-weight: 700;
    margin-bottom: 1.4rem;
  }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: .75rem; font-weight: 500;
    color: var(--muted2);
    margin-bottom: .35rem; letter-spacing: .04em; text-transform: uppercase;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .6rem .85rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: .9rem;
    outline: none; transition: border .15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
  .field textarea { resize: vertical; min-height: 80px; }

  .upload-area {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 1rem;
    text-align: center;
    cursor: pointer;
    color: var(--muted);
    font-size: .82rem;
    transition: border-color .15s, background .15s;
  }
  .upload-area:hover { border-color: var(--accent); background: rgba(167,139,250,.04); }

  #inp-file { display: none; }

  #thumb-preview {
    width: 100%; border-radius: 8px;
    object-fit: cover; max-height: 140px;
    margin-top: .6rem; display: none;
  }

  .modal-btns {
    display: flex; gap: .75rem; margin-top: 1.4rem;
  }
  .btn-cancel {
    padding: .65rem 1.2rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px; cursor: pointer;
    color: var(--muted2);
    font-family: 'DM Sans', sans-serif; font-size: .875rem;
    transition: border-color .15s;
  }
  .btn-cancel:hover { border-color: var(--muted); }
  .btn-save {
    flex: 1;
    background: var(--accent-dark); color: #fff;
    border: none; border-radius: 8px;
    padding: .65rem;
    font-family: 'DM Sans', sans-serif; font-size: .875rem; font-weight: 600;
    cursor: pointer; transition: background .15s;
  }
  .btn-save:hover { background: #6d28d9; }
  .btn-save:disabled { opacity: .5; cursor: default; }

  /* ── toast ── */
  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .65rem 1.4rem;
    font-size: .85rem;
    z-index: 300;
    animation: toastIn .25s ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @media (max-width: 600px) {
    header { padding: .9rem 1.2rem; }
    .grid  { padding: 1rem 1.2rem 3rem; gap: 1rem; }
    .search-wrap { padding: 1rem 1.2rem .2rem; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">✦ MyPortal</span>
  <button class="add-btn" onclick="openModal()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    リンク追加
  </button>
</header>

<div class="search-wrap">
  <span class="search-icon">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </span>
  <input type="search" id="search" placeholder="タイトル・URLで検索..." oninput="filterCards()" />
</div>

<div class="grid" id="grid">
  <div class="loading"><span class="spin">◌</span>&nbsp; 読み込み中...</div>
</div>

<!-- modal -->
<div class="overlay" id="modal" style="display:none" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-title">リンクを追加</div>

    <div class="field">
      <label>URL *</label>
      <input type="url" id="inp-url" placeholder="https://example.com" />
    </div>
    <div class="field">
      <label>タイトル *</label>
      <input type="text" id="inp-title" placeholder="サイト名" />
    </div>
    <div class="field">
      <label>説明</label>
      <textarea id="inp-desc" placeholder="このサイトについて書いてね（任意）"></textarea>
    </div>
    <div class="field">
      <label>サムネイル画像（任意）</label>
      <div class="upload-area" onclick="document.getElementById('inp-file').click()">
        📁 クリックして画像をアップロード
      </div>
      <input type="file" id="inp-file" accept="image/*" onchange="previewImg(event)" />
      <img id="thumb-preview" alt="プレビュー" />
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="btn-save" onclick="saveLink()">保存する</button>
    </div>
  </div>
</div>

<!-- Firebase SDKs (compat / Firestore only) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ─── Firebase init ─── */
const firebaseConfig = {
  apiKey: "AIzaSyAAg6pqT9_tFrg6lv-4od439vzie7cmxC0",
  authDomain: "po-tarusaito.firebaseapp.com",
  projectId: "po-tarusaito",
  storageBucket: "po-tarusaito.firebasestorage.app",
  messagingSenderId: "1001423060692",
  appId: "1:1001423060692:web:75bfef32bd611978634541"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ─── state ─── */
let allCards  = [];
let imgBase64 = '';   // Data URL を直接保持

/* ─── modal ─── */
function openModal() {
  document.getElementById('modal').style.display = 'flex';
}
function closeModal() {
  document.getElementById('modal').style.display = 'none';
  document.getElementById('inp-url').value   = '';
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-desc').value  = '';
  document.getElementById('inp-file').value  = '';
  document.getElementById('thumb-preview').style.display = 'none';
  imgBase64 = '';
}
function overlayClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

/* ─── 画像を読み込んでCanvasで圧縮 → Base64化 ─── */
function previewImg(e) {
  const f = e.target.files[0];
  if (!f) return;

  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      /* 長辺を最大 600px にリサイズ */
      const MAX = 600;
      let w = img.width, h = img.height;
      if (w > h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      else if (h > w && h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      else if (w > MAX) { w = h = MAX; }

      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);

      /* 品質 0.75 の JPEG で圧縮 */
      imgBase64 = canvas.toDataURL('image/jpeg', 0.75);

      const p = document.getElementById('thumb-preview');
      p.src = imgBase64;
      p.style.display = 'block';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(f);
}

/* ─── save ─── */
async function saveLink() {
  const url   = document.getElementById('inp-url').value.trim();
  const title = document.getElementById('inp-title').value.trim();
  const desc  = document.getElementById('inp-desc').value.trim();
  if (!url || !title) { showToast('⚠ URLとタイトルは必須だよ！'); return; }

  const btn = document.getElementById('btn-save');
  btn.textContent = '保存中...'; btn.disabled = true;

  try {
    await db.collection('links').add({
      url, title, desc,
      thumbUrl: imgBase64,   // Data URL をそのまま保存
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    closeModal();
    showToast('✓ 追加したよ！');
    loadLinks();
  } catch (err) {
    showToast('エラー: ' + err.message);
  }
  btn.textContent = '保存する'; btn.disabled = false;
}

/* ─── delete ─── */
async function deleteLink(id, e) {
  e.preventDefault(); e.stopPropagation();
  if (!confirm('このリンクを削除する？')) return;
  try {
    await db.collection('links').doc(id).delete();
    showToast('削除したよ');
    loadLinks();
  } catch (err) {
    showToast('削除エラー: ' + err.message);
  }
}

/* ─── render card ─── */
function renderCard(data, id) {
  const thumb = data.thumbUrl
    ? `<div class="card-thumb"><img src="${escHtml(data.thumbUrl)}" alt=""/></div>`
    : `<div class="card-thumb"><div class="card-thumb-icon">🔗</div></div>`;

  return `
  <a class="card" href="${escHtml(data.url)}" target="_blank" rel="noopener noreferrer"
     data-title="${escAttr(data.title)}" data-url="${escAttr(data.url)}">
    ${thumb}
    <div class="card-body">
      <div class="card-title">${escHtml(data.title || '無題')}</div>
      <div class="card-url">${escHtml(data.url)}</div>
      ${data.desc ? `<div class="card-desc">${escHtml(data.desc)}</div>` : ''}
    </div>
    <div class="card-footer">
      <span class="card-open">新しいタブで開く ↗</span>
      <button class="del-btn" onclick="deleteLink('${id}', event)">削除</button>
    </div>
  </a>`;
}

/* ─── load ─── */
async function loadLinks() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="loading"><span class="spin">◌</span>&nbsp; 読み込み中...</div>';
  try {
    const snap = await db.collection('links').orderBy('createdAt', 'desc').get();
    allCards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderFiltered();
  } catch (err) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><p>読み込みエラー:<br>${escHtml(err.message)}</p></div>`;
  }
}

/* ─── filter ─── */
function filterCards() {
  renderFiltered();
}
function renderFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = q
    ? allCards.filter(c =>
        (c.title || '').toLowerCase().includes(q) ||
        (c.url   || '').toLowerCase().includes(q) ||
        (c.desc  || '').toLowerCase().includes(q))
    : allCards;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">✦</div>
        <p>${q ? '「' + escHtml(q) + '」に一致するリンクはないよ' : 'まだリンクがないよ<br>上の「リンク追加」から追加してみて！'}</p>
      </div>`;
    return;
  }
  grid.innerHTML = filtered.map((c, i) => {
    const el = renderCard(c, c.id);
    return el.replace('animation: fadeUp', `animation-delay:${i * 0.04}s; animation: fadeUp`);
  }).join('');
}

/* ─── toast ─── */
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

/* ─── escape helpers ─── */
function escHtml(s = '') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s = '') { return escHtml(s); }

/* ─── keyboard shortcut ─── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ─── init ─── */
loadLinks();
</script>
</body>
</html>
